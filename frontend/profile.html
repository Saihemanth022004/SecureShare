<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Profile – SecureShare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="/css/style.css?v=4" />
</head>

<body data-page="profile">

  <nav class="navbar">
    <div class="container">
      <a class="nav-brand" href="/">
        <svg viewBox="0 0 24 24" fill="none" stroke="url(#g1)" stroke-width="2" stroke-linecap="round">
          <defs>
            <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#6366f1" />
              <stop offset="100%" stop-color="#06b6d4" />
            </linearGradient>
          </defs>
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        <span>SecureShare</span>
      </a>
      <button class="hamburger" aria-label="Menu" onclick="this.nextElementSibling.classList.toggle('open')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/upload">Upload</a>
        <a href="/download">Download</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/profile" class="active">Profile</a>
      </div>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="container-sm">

      <div class="card" style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;margin-bottom:20px">
        <img id="profile-avatar" alt="Profile Avatar" src="" width="88" height="88"
          style="border-radius:50%;border:1px solid var(--border);background:#fff;object-fit:cover" />
        <div>
          <h1 style="font-size:1.8rem;margin-bottom:8px">User Profile</h1>
          <p>Manage your account details for SecureShare.</p>
        </div>
      </div>

      <div class="card">
        <div class="form-group">
          <label class="form-label" for="profile-name">Display Name</label>
          <input class="form-control" id="profile-name" type="text" placeholder="Enter your display name" />
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="form-control" id="profile-email" style="display:flex;align-items:center;min-height:44px">—</div>
        </div>

        <div class="form-group">
          <label class="form-label">User ID</label>
          <div class="form-control" id="profile-uid"
            style="display:flex;align-items:center;min-height:44px;font-family:monospace;font-size:.82rem;word-break:break-all">—</div>
        </div>

        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <button id="save-profile-btn" class="btn btn-primary">Save Profile</button>
          <button id="reset-password-btn" class="btn btn-outline">Send Password Reset Email</button>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <div class="container">
      <p>SecureShare © 2026 &nbsp;·&nbsp; AI-Powered Secure File Sharing</p>
    </div>
  </footer>

  <style>.bottom-nav{display:none}@media(max-width:768px){.bottom-nav{display:block!important}body{padding-bottom:68px}}</style>
  <nav class="bottom-nav" style="position:fixed;bottom:0;left:0;right:0;z-index:1000;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid #e4e4e7;padding:6px 0;box-shadow:0 -4px 16px rgba(0,0,0,.06)"><div class="bottom-nav-inner" style="display:flex;justify-content:space-around;align-items:center;max-width:480px;margin:0 auto">
    <a href="/" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;color:#71717a;font-size:.65rem;font-weight:600;text-decoration:none"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Home</a>
    <a href="/upload" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;color:#71717a;font-size:.65rem;font-weight:600;text-decoration:none"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Upload</a>
    <a href="/download" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;color:#71717a;font-size:.65rem;font-weight:600;text-decoration:none"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download</a>
    <a href="/dashboard" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;color:#71717a;font-size:.65rem;font-weight:600;text-decoration:none"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>Dashboard</a>
  </div></nav>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/script.js?v=3"></script>
</body>

</html>
